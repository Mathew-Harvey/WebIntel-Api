# render.yaml — deploy to Render as a Docker web service
services:
  - type: web
    name: webintel-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: API_KEYS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: "WebIntel <hello@webintel.dev>"
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: FREE_TIER_LIMIT
        value: "100"
      - key: PAID_TIER_LIMIT
        value: "5000"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: ALLOWED_ORIGINS
        sync: false
